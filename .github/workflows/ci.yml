name: CI Pipeline

# When does this workflow run?
# - On every push to main branch
# - On every pull request to main branch
# - Manually via GitHub UI (workflow_dispatch)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Jobs run in parallel by default (we'll make them sequential where needed)
jobs:
  # Job 1: Backend CI
  backend-ci:
    name: Backend - Lint, Test, Build
    runs-on: ubuntu-latest  # Free tier: runs on Ubuntu VM
    
    # Service containers: PostgreSQL and Redis
    # These run alongside your tests so you can test against real databases
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pricedelta_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./backend

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Use Node 20 LTS
          cache: 'npm'  # Cache npm packages for faster builds
          cache-dependency-path: backend/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci  # ci = clean install (faster than npm install in CI)

      # Step 4: Generate Prisma Client
      - name: Generate Prisma Client
        run: npx prisma generate

      # Step 5: Run database migrations
      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pricedelta_test

      # Step 6: TypeScript type checking
      - name: TypeScript type check
        run: npx tsc --noEmit  # Check types without building

      # Step 7: Run tests
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pricedelta_test
          JWT_SECRET: test-jwt-secret-for-ci-pipeline-minimum-32-characters
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      # Step 8: Build the project
      - name: Build
        run: npm run build

      # Step 9: Upload build artifacts (optional - useful for deployment)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 7  # Keep for 7 days

  # Job 2: Frontend CI
  frontend-ci:
    name: Frontend - Lint, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc -b

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api  # Dummy value for build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # Job 3: Success summary (runs only if both jobs pass)
  success:
    name: All Checks Passed ✅
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]  # Wait for both jobs
    
    steps:
      - name: Summary
        run: |
          echo "🎉 All CI checks passed!"
          echo "✅ Backend: Linted, tested, built"
          echo "✅ Frontend: Linted, built"
          echo "Ready to deploy! 🚀"
